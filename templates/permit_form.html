{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 border rounded-xl shadow-md">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800">
            {% if permit and permit.id %}📋 تعديل تصريح: {{ permit.name }}{% else %}📋 إصدار تصريح دخول مكة المكرمة{% endif %}
        </h2>
        <a href="{{ url_for('dashboard') }}" class="text-blue-600 hover:text-blue-800 text-sm">← العودة للرئيسية</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">رقم التصريح <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="permit_number" type="text" placeholder="مثال: 1234567890" value="{{ permit.permit_number if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">رقم الهوية <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="id_number" type="text" pattern="[0-9]+" title="أرقام فقط" placeholder="مثال: 1012345678" value="{{ permit.id_number if permit else '' }}" required>
        </div>

        <div class="col-span-2">
            <label class="block text-gray-700 text-sm font-bold mb-1">اسم حامل التصريح <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="name" type="text" placeholder="الاسم الكامل" value="{{ permit.name if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">الجنسية <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="nationality" type="text" placeholder="مثال: سعودي" value="{{ permit.nationality if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">الجنس <span class="text-red-500">*</span></label>
            <select
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="gender" required>
                <option value="" disabled {{ 'selected' if not permit }}>-- اختر --</option>
                <option value="ذكر" {{ 'selected' if permit and permit.gender == 'ذكر' }}>ذكر</option>
                <option value="أنثى" {{ 'selected' if permit and permit.gender == 'أنثى' }}>أنثى</option>
            </select>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">تاريخ الميلاد <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="dob" type="date" value="{{ permit.dob if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">تاريخ إصدار التصريح <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="issue_date" type="date" value="{{ permit.issue_date if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">تاريخ انتهاء التصريح <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="expiry_date" type="date" value="{{ permit.expiry_date if permit else '' }}" required>
        </div>

        <div class="col-span-2">
            <label class="block text-gray-700 text-sm font-bold mb-1">اسم الشركة / المؤسسة <span
                    class="text-red-500">*</span></label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="company" type="text" placeholder="اسم جهة العمل" value="{{ permit.company if permit else '' }}" required>
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">جهة الموافقة</label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="authority" type="text" value="{{ permit.authority if permit else 'المديرية العامة للجوازات' }}">
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-gray-700 text-sm font-bold mb-1">غرض التصريح</label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="purpose" type="text" value="{{ permit.purpose if permit else 'عمل موسمي' }}">
        </div>

        <div class="col-span-2">
            <label class="block text-gray-700 text-sm font-bold mb-1">وصف غرض التصريح</label>
            <input
                class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                name="purpose_desc" type="text" value="{{ permit.purpose_desc if permit else 'تصريح دخول مكة للمناطق (أحياء العاصمة المقدسة) فقط' }}">
        </div>

        <div class="col-span-2 border-2 border-dashed border-gray-300 rounded-lg p-4 bg-gray-50">
            <label class="block text-gray-700 text-sm font-bold mb-2">📷 صورة المستفيد (خلفية بيضاء) {% if not permit %}<span
                    class="text-red-500">*</span>{% endif %}</label>
            <input class="w-full text-gray-700 text-sm" type="file" name="photo" accept="image/*" {{ '' if permit else 'required' }}>
            {% if permit %}
                <p class="text-xs text-gray-500 mt-1 text-right">اتركه فارغاً للاحتفاظ بالصورة الحالية</p>
            {% endif %}
        </div>

        <div class="col-span-2">
            <button
                class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg w-full text-lg transition"
                type="submit">
                {{ '💾 حفظ التعديلات' if permit else '✅ حفظ وإصدار التصريح' }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
